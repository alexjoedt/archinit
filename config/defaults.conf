# config/defaults.conf — archinit default configuration
# Override any key by setting it in ~/.archinit/config.local
# (or $ARCHINIT_HOME/config.local)
# Format: KEY=value  (sourced as bash; do not use spaces around =)

# ---------------------------------------------------------------------------
# Self-update
# ---------------------------------------------------------------------------
UPDATE_INTERVAL_HOURS=24

# ---------------------------------------------------------------------------
# Packages & modules
# ---------------------------------------------------------------------------
AUR_HELPER=yay
# Empty = install all modules; space-separated list to restrict (e.g. "base aur-helper services")
DEFAULT_MODULES=""

# When true, packages captured in the latest snapshot are merged with curated
# lists on every install/update (idempotent via --needed).
INSTALL_SNAPSHOT_PACKAGES=true

# ---------------------------------------------------------------------------
# Dotfiles
# ---------------------------------------------------------------------------
DOTFILES_MANAGER=dman
DOTFILES_REPO=""
DOTFILES_PROFILE=default

# ---------------------------------------------------------------------------
# Display / desktop
# ---------------------------------------------------------------------------
DISPLAY_MANAGER=sddm

# ---------------------------------------------------------------------------
# Git / GitHub identity
# ---------------------------------------------------------------------------
GIT_USER_NAME=""
GIT_USER_EMAIL=""
# Auth method: ssh | token | skip
GIT_AUTH_METHOD=ssh
# Whether to offer gh auth login during the git module
SETUP_GH_CLI=true
# Remote URL (populated by install/git module; empty = not yet set)
GIT_REMOTE=""
GIT_BRANCH=main
